<script>
    // 已設定為你的 Firebase Database 網址
    const firebaseConfig = {
        databaseURL: "https://heart-c720e-default-rtdb.firebaseio.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allHistoryData = []; 
    let heartChart = null;

    // 取得在地日期的 YYYY-MM-DD 格式 (避免 UTC 時區問題)
    function getLocalDateString(d = new Date()) {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // 預設日期設定為今天
    const todayStr = getLocalDateString();
    document.getElementById('startDate').value = todayStr;
    document.getElementById('endDate').value = todayStr;

    // 1. 即時狀態監聽 (/currentStatus)
    database.ref('/currentStatus').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data !== null) {
            if (data.isWearing === true && data.bpm > 0) {
                document.getElementById('liveBpm').innerText = data.bpm;
                document.getElementById('liveStatus').innerText = "穩定監測中";
                document.getElementById('liveStatus').className = "status-badge yes";
                document.getElementById('liveHeart').classList.add('beating');
            } else {
                document.getElementById('liveBpm').innerText = "--";
                document.getElementById('liveStatus').innerText = "未配戴";
                document.getElementById('liveStatus').className = "status-badge no";
                document.getElementById('liveHeart').classList.remove('beating');
            }
        }
    }, (error) => {
        console.error("即時讀取失敗:", error);
    });

    // 2. 歷史紀錄監聽 (/heartRateHistory)
    database.ref('/heartRateHistory').on('value', (snapshot) => {
        allHistoryData = [];
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                // 確保 timestamp 與 bpm 格式正確
                if (item && item.bpm !== undefined) {
                    allHistoryData.push({
                        timestamp: item.timestamp || Date.now(),
                        bpm: Number(item.bpm)
                    });
                }
            });
        }
        console.log("從 Firebase 讀取的總筆數：", allHistoryData.length);
        filterData();
    }, (error) => {
        console.error("歷史資料讀取失敗:", error);
    });

    // 3. 篩選與走勢圖更新
    function filterData() {
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;

        document.getElementById('avgRangeText').innerText = `查詢區間：${startVal || '全部'} ~ ${endVal || '全部'}`;

        let filtered = [...allHistoryData];

        // 若有選擇日期則進行範圍過濾
        if (startVal && endVal) {
            const startTime = new Date(startVal + 'T00:00:00').getTime();
            const endTime = new Date(endVal + 'T23:59:59').getTime();

            filtered = filtered.filter(item => {
                const ts = Number(item.timestamp);
                return ts >= startTime && ts <= endTime;
            });
        }

        filtered.sort((a, b) => a.timestamp - b.timestamp);

        // 無資料處理
        if (filtered.length === 0) {
            document.getElementById('avgBpmText').innerText = "--";
            document.getElementById('toggleIndicator').innerText = `點擊展開 共 0 筆 ▾ (總庫存 ${allHistoryData.length} 筆)`;
            document.getElementById('historyTableBody').innerHTML = `<tr><td colspan="2" style="text-align:center; color:#999;">該區間查無量測紀錄</td></tr>`;
            updateChart([], []);
            return;
        }

        // 計算平均心跳
        const totalBpm = filtered.reduce((sum, item) => sum + item.bpm, 0);
        const avgBpm = Math.round(totalBpm / filtered.length);
        document.getElementById('avgBpmText').innerText = avgBpm;

        // 填寫表格數據 (最新呈現於最前)
        const tableData = [...filtered].reverse();
        let tableHtml = '';
        tableData.forEach(item => {
            const d = new Date(item.timestamp);
            const timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.toLocaleTimeString('zh-TW', {hour12: true})}`;
            tableHtml += `<tr><td>${timeStr}</td><td style="font-weight:bold; color:var(--primary-color);">${item.bpm}</td></tr>`;
        });
        document.getElementById('historyTableBody').innerHTML = tableHtml;

        // 畫圖數據轉換
        const labels = filtered.map(item => {
            const d = new Date(item.timestamp);
            return `${d.getMonth()+1}/${d.getDate()} ${d.toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12:true})}`;
        });
        const bpmData = filtered.map(item => item.bpm);
        updateChart(labels, bpmData);

        // 更新展開數量
        document.getElementById('toggleIndicator').innerText = `點擊收起 共 ${filtered.length} 筆 ▴`;
    }

    // 4. Chart.js 繪製
    function updateChart(labels, data) {
        const ctx = document.getElementById('heartChart').getContext('2d');
        if (heartChart) heartChart.destroy();

        heartChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '心拍數 (BPM)',
                    data: data,
                    borderColor: '#2b8c90',
                    backgroundColor: 'rgba(43, 140, 144, 0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#2b8c90',
                    pointRadius: 4,
                    fill: true,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: 40, max: 160, ticks: { stepSize: 20 } },
                    x: { ticks: { maxRotation: 15, autoSkip: true, maxTicksLimit: 10 } }
                }
            }
        });
    }

    // 5. 展開/收折邏輯
    function toggleCollapse() {
        const content = document.getElementById('collapseContent');
        const indicator = document.getElementById('toggleIndicator');
        
        if (content.style.display === "block") {
            content.style.display = "none";
            indicator.innerText = indicator.innerText.replace('收起', '展開').replace('▴', '▾');
        } else {
            content.style.display = "block";
            indicator.innerText = indicator.innerText.replace('展開', '收起').replace('▾', '▴');
        }
    }

    // 清空篩選按鈕：會顯示 Firebase 所有累積的歷史數據
    function clearFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        filterData();
    }
</script>
