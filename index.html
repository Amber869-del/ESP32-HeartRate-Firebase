<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity 心率即時監測面板</title>
    <!-- 引入 Firebase SDK (使用相容版本 v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .heart-container {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .heart {
            font-size: 80px;
            color: #ff4d4d;
            transition: transform 0.1s;
        }
        /* 心跳動畫效果 */
        .beating {
            animation: beat 0.6s infinite alternate;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .bpm-value {
            font-size: 64px;
            font-weight: bold;
            color: #222;
            margin: 10px 0;
        }
        .unit {
            font-size: 20px;
            color: #777;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
        }
        .status-yes {
            background-color: #e6f4ea;
            color: #137333;
        }
        .status-no {
            background-color: #fce8e6;
            color: #c5221f;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>即時心率監測</h2>
    
    <div class="heart-container">
        <div id="heartIcon" class="heart">❤️</div>
    </div>
    
    <div class="bpm-value">
        <span id="bpmNumber">--</span> <span class="unit">BPM</span>
    </div>
    
    <div id="statusBadge" class="status-badge status-no">未偵測到配戴</div>
</div>

<script>
    // --- ⚠️請在此處填入與你 ESP32 相同的 Firebase 設定 ---
    const firebaseConfig = {
        databaseURL: "https://YOUR_FIREBASE_URL" // 填入你的 Firebase 即時資料庫網址
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const bpmNumber = document.getElementById('bpmNumber');
    const heartIcon = document.getElementById('heartIcon');
    const statusBadge = document.getElementById('statusBadge');

    // 定時監聽 Firebase 的 /currentStatus 路徑
    database.ref('/currentStatus').on('value', (snapshot) => {
        const data = snapshot.val();
        
        if (data) {
            const bpm = data.bpm || 0;
            const isWearing = data.isWearing || false;

            if (isWearing && bpm > 0) {
                // 有配戴且有心率
                bpmNumber.innerText = bpm;
                statusBadge.innerText = "穩定監測中";
                statusBadge.className = "status-badge status-yes";
                heartIcon.classList.add('beating');
            } else {
                // 未配戴
                bpmNumber.innerText = "--";
                statusBadge.innerText = "未偵測到配戴";
                statusBadge.className = "status-badge status-no";
                heartIcon.classList.remove('beating');
            }
        } else {
            bpmNumber.innerText = "--";
            statusBadge.innerText = "無資料連線";
            statusBadge.className = "status-badge status-no";
            heartIcon.classList.remove('beating');
        }
    }, (error) => {
        console.error("讀取 Firebase 失敗:", error);
    });
</script>

</body>
</html>
