<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心率歷史數據查詢系統</title>
  <!-- 載入 Firebase 8.x SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <!-- 載入 Chart.js 畫圖工具 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-color: #2d3748;
      --primary-color: #3182ce;
      --success-color: #38a169;
      --danger-color: #e53e3e;
      --border-color: #e2e8f0;
      --dark-gray: #4a5568;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* 頂部標題 */
    header {
      background-color: var(--dark-gray);
      color: white;
      padding: 15px 20px;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    /* 時間軸篩選與控制區 */
    .filter-section {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
    }

    .filter-group label {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      color: var(--dark-gray);
    }

    .filter-group input {
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 5px;
      font-size: 14px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* 按鈕樣式 */
    .btn {
      background-color: #2b6cb0;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #1a365d;
    }

    .btn-secondary {
      background-color: #edf2f7;
      color: #2d3748;
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: #e2e8f0;
    }

    /* 摺疊面板：預設隱藏數據 */
    .collapse-content {
      display: none; /* 預設隱藏 */
    }

    .collapse-content.show {
      display: block; /* 展開時顯示 */
    }

    /* 統計區 */
    .stats-card {
      background: #319795;
      color: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
    }

    .stats-card .value {
      font-size: 48px;
      font-weight: bold;
    }

    /* 圖表與表格 */
    .dashboard-section {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }

    .table-responsive {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #edf2f7;
      position: sticky;
      top: 0;
      color: #4a5568;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 1. 頂部標題列 -->
    <header>
      <h1>基本資料 & 記錄查詢</h1>
      <span style="font-size: 14px;">姓名：莊智</span>
    </header>

    <!-- 2. 時間軸篩選控制區 -->
    <div class="filter-section">
      <div class="filter-grid">
        <div class="filter-group">
          <label>開始日期</label>
          <input type="date" id="start-date">
        </div>
        <div class="filter-group">
          <label>結束日期</label>
          <input type="date" id="end-date">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="resetFilters()">清空條件</button>
        <button class="btn" onclick="toggleAndQuery()">🔍 送出查詢並展開數據</button>
      </div>
    </div>

    <!-- 3. 預設隱藏的數據區（點擊查詢後才展示） -->
    <div id="data-area" class="collapse-content">
      
      <!-- 數值顯示 -->
      <div class="stats-card">
        <div style="font-size: 16px; text-transform: uppercase; letter-spacing: 1px;">所選區間平均心跳</div>
        <div class="value" id="avg-bpm">0 <span style="font-size: 20px;">/min</span></div>
        <div id="query-range-text" style="font-size: 12px; margin-top: 5px; opacity: 0.8;"></div>
      </div>

      <!-- 趨勢圖表 -->
      <div class="dashboard-section">
        <h3 style="margin-top: 0;">心率活動度走勢圖</h3>
        <div class="chart-container">
          <canvas id="historyChart"></canvas>
        </div>
      </div>

      <!-- 細節表格 -->
      <div class="dashboard-section">
        <h3 style="margin-top: 0; display: flex; justify-content: space-between;">
          <span>量測歷史明細</span>
          <span id="record-count" style="font-size: 14px; color: #718096; font-weight: normal;">共 0 筆紀錄</span>
        </h3>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>序號</th>
                <th>量測日期與時間</th>
                <th>心率 (BPM)</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr>
                <td colspan="3" style="text-align: center; color: #a0aec0;">無符合篩選條件的數據</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ================= 1. Firebase 初始化 =================
    // 對接與你的 ESP32 相同的 Firebase 即時資料庫
    const firebaseConfig = {
      databaseURL: "https://heart-c720e-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allRawData = []; // 存放從 Firebase 下載的所有歷史數據

    // 設定預設日期為今天
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('start-date').value = todayStr;
    document.getElementById('end-date').value = todayStr;

    // ================= 2. 初始化 Chart.js 圖表 =================
    const ctx = document.getElementById('historyChart').getContext('2d');
    const historyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: '心拍數 (BPM)',
          data: [],
          borderColor: '#319795',
          backgroundColor: 'rgba(49, 151, 149, 0.1)',
          borderWidth: 2,
          pointRadius: 4,
          tension: 0.1,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: { min: 40, max: 180 }
        }
      }
    });

    // ================= 3. 即時載入 Firebase 數據備用 =================
    database.ref('/heartRateHistory').on('value', (snapshot) => {
      const data = snapshot.val();
      allRawData = [];
      if (!data) return;

      Object.keys(data).forEach((key) => {
        const item = data[key];
        // 讀取帶有 timestamp 結構的數據
        if (typeof item === 'object' && item.timestamp) {
          allRawData.push({
            timestamp: item.timestamp,
            bpm: item.bpm
          });
        }
      });
    });

    // ================= 4. 點擊送出查詢時的動作 (展開並篩選數據) =================
    function toggleAndQuery() {
      // 展開數據區域
      document.getElementById('data-area').classList.add('show');

      // 取得使用者設定的時間軸區間
      const startDateVal = document.getElementById('start-date').value;
      const endDateVal = document.getElementById('end-date').value;

      if (!startDateVal || !endDateVal) {
        alert("請選擇完整的開始與結束日期！");
        return;
      }

      // 設定搜尋的精確時間毫秒數 (自開始日 00:00:00 至 結束日 23:59:59)
      const startMs = new Date(startDateVal + "T00:00:00").getTime();
      const endMs = new Date(endDateVal + "T23:59:59").getTime();

      // 篩選出時間軸範圍內的數據
      const filteredData = allRawData.filter(item => item.timestamp >= startMs && item.timestamp <= endMs);

      // 依時間由舊到新排序
      filteredData.sort((a, b) => a.timestamp - b.timestamp);

      updateDashboard(filteredData, startDateVal, endDateVal);
    }

    // ================= 5. 更新圖表與表格數據 =================
    function updateDashboard(dataList, startDate, endDate) {
      document.getElementById('query-range-text').innerText = `查詢區間：${startDate} ~ ${endDate}`;
      document.getElementById('record-count').innerText = `共 ${dataList.length} 筆紀錄`;

      if (dataList.length === 0) {
        document.getElementById('avg-bpm').innerHTML = `0 <span style="font-size: 20px;">/min</span>`;
        document.getElementById('table-body').innerHTML = `<tr><td colspan="3" style="text-align: center; color: #a0aec0;">此區間無任何量測紀錄</td></tr>`;
        historyChart.data.labels = [];
        historyChart.data.datasets[0].data = [];
        historyChart.update();
        return;
      }

      // 1. 計算平均值
      const totalBpm = dataList.reduce((sum, item) => sum + item.bpm, 0);
      const avgBpm = Math.round(totalBpm / dataList.length);
      document.getElementById('avg-bpm').innerHTML = `${avgBpm} <span style="font-size: 20px;">/min</span>`;

      // 2. 更新走勢圖表
      const labels = dataList.map(item => {
        const d = new Date(item.timestamp);
        return `${d.getMonth()+1}/${d.getDate()} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}`;
      });
      const bpms = dataList.map(item => item.bpm);

      historyChart.data.labels = labels;
      historyChart.data.datasets[0].data = bpms;
      historyChart.update();

      // 3. 更新明細表格（最新時間排最上面）
      const tableBody = document.getElementById('table-body');
      tableBody.innerHTML = '';
      const displayList = [...dataList].reverse();

      displayList.forEach((item, index) => {
        const d = new Date(item.timestamp);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${d.toLocaleTimeString()}`;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>#${displayList.length - index}</td>
          <td>${dateStr}</td>
          <td style="font-weight: bold; color: #319795;">${item.bpm} BPM</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    // ================= 6. 清空篩選條件 =================
    function resetFilters() {
      document.getElementById('start-date').value = todayStr;
      document.getElementById('end-date').value = todayStr;
      document.getElementById('data-area').classList.remove('show'); // 重新隱藏數據
    }
  </script>
</body>
</html>
